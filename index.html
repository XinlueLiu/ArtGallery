<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>流光拾影 — 摄影作品</title>
  <meta name="description" content="一处安静的线上影像馆 —— 自然、繁花、城市、生灵与家味。" />
  <style>
    /* 标题用楷体：霞鹜文楷(LXGW WenKai, OFL)的子集，自托管在本仓库 fonts/，
       只保留所需字形（约 12KB，分多个小文件，按需加载），在中国也能快速显示，
       且在 iPhone / Android 上都能正确呈现楷体。
       正文继续使用系统字体，不加载任何 Google 字体（在中国大陆被屏蔽）。 */
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-0.woff2') format('woff2');unicode-range:U+62FE;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-1.woff2') format('woff2');unicode-range:U+6EDA;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-2.woff2') format('woff2');unicode-range:U+5218,U+7E41;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-3.woff2') format('woff2');unicode-range:U+6444;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-4.woff2') format('woff2');unicode-range:U+5411,U+5F20,U+7167,U+98DF;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-5.woff2') format('woff2');unicode-range:U+5149,U+57CE,U+5F71,U+6D41,U+7136,U+7B2C,U+82B1;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-6.woff2') format('woff2');unicode-range:U+4E0A,U+4E0B,U+4F5C,U+52A8,U+54C1,U+5C0F,U+5E02,U+7247,U+7269,U+7F8E,U+81EA;}
    @font-face{font-family:'KaiWeb';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/kai-7.woff2') format('woff2');unicode-range:U+4E00;}
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #b0aca4;
      --line: #ececec;
      --dot: #d8d4cc;
      --sans: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB",
              -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: "Songti SC", "Noto Serif SC", "STSong", Georgia, serif;
      --title: "KaiWeb", "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
      --bar: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: var(--bar); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    img { display: block; }

    /* ---------- 顶部导航 ---------- */
    .topbar {
      position: fixed;
      top: 0; left: 0; width: 100%;
      height: var(--bar);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
      padding-top: env(safe-area-inset-top);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }
    .brand {
      font-family: var(--title);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }
    .sectnav {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .sectnav::-webkit-scrollbar { display: none; }
    .sectnav a {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 9px;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .sectnav a.active, .sectnav a:hover { color: var(--text); }

    /* ---------- 开篇 ---------- */
    .intro {
      height: 58vh;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--bar) 24px 0;
    }
    .intro .big {
      font-family: var(--title);
      font-size: clamp(26px, 4.6vw, 38px);
      font-weight: 500;
      letter-spacing: 0.36em;
      text-indent: 0.36em;
    }
    .intro .sub {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-indent: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .intro .hint {
      margin-top: 42px;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--muted);
      animation: bob 2.4s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

    /* ---------- 分区 ---------- */
    .section { padding: 26px 0 44px; border-top: 1px solid var(--line); }
    .section-head {
      text-align: center;
      margin-bottom: 18px;
      padding: 0 24px;
    }
    .section-head h2 {
      font-family: var(--title);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
    }
    .section-head .en {
      display: block;
      margin-top: 6px;
      font-size: 10px;
      letter-spacing: 0.36em;
      text-indent: 0.36em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---------- 轮播（一次一张，左右滑动） ---------- */
    .stage { position: relative; }
    .viewport {
      height: 80vh;
      min-height: 380px;
      overflow: hidden;
      touch-action: pan-y;   /* 纵向交给页面滚动，横向由脚本处理 */
    }
    .track {
      display: flex;
      height: 100%;
      transition: transform 0.45s cubic-bezier(.2,.7,.2,1);
      will-change: transform;
    }
    .slide {
      flex: 0 0 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }
    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto; height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.6s ease;
      user-select: none; -webkit-user-drag: none;
    }
    .slide img.loaded { opacity: 1; }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, background 0.2s;
      z-index: 5;
    }
    .stage:hover .arrow { opacity: 0.85; }
    .arrow:hover { opacity: 1; background: #fff; }
    .arrow.prev { left: 22px; }
    .arrow.next { right: 22px; }

    .dots {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-top: 22px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dot);
      border: none; padding: 0;
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }
    .dot.active { background: var(--text); transform: scale(1.25); }

    /* ---------- 页脚 ---------- */
    footer {
      text-align: center;
      padding: 48px 24px 60px;
      padding-bottom: max(60px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
    }

    @media (hover: none) { .arrow { display: none; } }
    @media (max-width: 600px) {
      .brand { font-size: 15px; letter-spacing: 0.14em; }
      .sectnav a { font-size: 12px; padding: 6px 6px; }
      .viewport { height: 72vh; }
      .slide { padding: 0 10px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="#top">流光拾影</a>
    <nav class="sectnav" id="sectnav"></nav>
  </header>

  <section class="intro" id="top">
    <div class="big">流光拾影</div>
    <div class="sub">摄影作品 · 刘</div>
    <div class="hint">向下滚动 ↓</div>
  </section>

  <main id="main"></main>

  <footer>© <span id="year"></span> 流光拾影 · 摄影 刘</footer>

<script>
  /* =========================================================
     分区与照片 / SECTIONS & PHOTOS
     每个分区：zh 中文标题 · en 英文小字 · photos 文件名列表
     文件名要和实际文件完全一致（注意大小写：.JPG 和 .jpg 不同）。
     ========================================================= */
  const SECTIONS = [
    { id: "nature", zh: "自然", en: "Nature",   photos: ["images/nature_001.JPG", "images/nature_002.JPG"] },
    { id: "flower", zh: "繁花", en: "Flowers",  photos: ["images/flower_001.JPG", "images/flower_002.JPG", "images/flower_003.JPG", "images/flower_004.JPG"] },
    { id: "city",   zh: "城市", en: "City",     photos: ["images/city_001.JPG", "images/city_002.JPG", "images/city_003.JPG"] },
    { id: "animal", zh: "小动物", en: "Animals",  photos: ["images/animal_001.JPG"] },
    { id: "food",   zh: "美食",   en: "Homemade", photos: ["images/food_001.JPG", "images/food_002.JPG"] },
  ];
  /* ========================================================= */

  document.getElementById("year").textContent = new Date().getFullYear();
  const main = document.getElementById("main");
  const sectnav = document.getElementById("sectnav");

  SECTIONS.forEach(sec => {
    // 导航
    const link = document.createElement("a");
    link.href = "#" + sec.id;
    link.textContent = sec.zh;
    link.dataset.id = sec.id;
    sectnav.appendChild(link);

    // 分区
    const section = document.createElement("section");
    section.className = "section";
    section.id = sec.id;

    const head = document.createElement("div");
    head.className = "section-head";
    head.innerHTML = "<h2>" + sec.zh + "</h2>";
    section.appendChild(head);

    section.appendChild(buildCarousel(sec));
    main.appendChild(section);
  });

  function buildCarousel(sec) {
    const n = sec.photos.length;
    const stage = document.createElement("div");
    stage.className = "stage";

    const viewport = document.createElement("div");
    viewport.className = "viewport";
    const track = document.createElement("div");
    track.className = "track";
    sec.photos.forEach(src => {
      const slide = document.createElement("div");
      slide.className = "slide";
      const img = document.createElement("img");
      img.src = src;
      img.alt = sec.zh;
      img.loading = "lazy";
      img.addEventListener("load", () => img.classList.add("loaded"));
      slide.appendChild(img);
      track.appendChild(slide);
    });
    viewport.appendChild(track);
    stage.appendChild(viewport);

    const prev = document.createElement("button");
    prev.className = "arrow prev"; prev.innerHTML = "&#8249;"; prev.setAttribute("aria-label", "上一张");
    const next = document.createElement("button");
    next.className = "arrow next"; next.innerHTML = "&#8250;"; next.setAttribute("aria-label", "下一张");
    stage.appendChild(prev); stage.appendChild(next);

    const dots = document.createElement("div");
    dots.className = "dots";
    sec.photos.forEach((_, i) => {
      const d = document.createElement("button");
      d.className = "dot" + (i === 0 ? " active" : "");
      d.setAttribute("aria-label", "第 " + (i + 1) + " 张");
      dots.appendChild(d);
    });

    const wrap = document.createElement("div");
    wrap.appendChild(stage);
    wrap.appendChild(dots);

    let current = 0;
    const dotEls = Array.from(dots.children);

    function render(offsetPx) {
      const base = -current * 100;
      track.style.transform = offsetPx
        ? "translateX(calc(" + base + "% + " + offsetPx + "px))"
        : "translateX(" + base + "%)";
    }
    function goTo(i) {
      current = Math.max(0, Math.min(n - 1, i));
      track.style.transition = "";
      render(0);
      dotEls.forEach((d, k) => d.classList.toggle("active", k === current));
    }
    dotEls.forEach((d, i) => d.addEventListener("click", () => goTo(i)));
    prev.addEventListener("click", () => goTo(current - 1));
    next.addEventListener("click", () => goTo(current + 1));

    // 触摸：横向滑动切换照片，纵向手势交给页面正常滚动
    let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false, decided = false, horiz = false;
    viewport.addEventListener("touchstart", e => {
      if (n <= 1) return;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      dx = dy = 0; dragging = true; decided = false; horiz = false;
      track.style.transition = "none";
    }, { passive: true });
    viewport.addEventListener("touchmove", e => {
      if (!dragging) return;
      const t = e.touches[0];
      dx = t.clientX - startX; dy = t.clientY - startY;
      if (!decided && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
        decided = true;
        horiz = Math.abs(dx) > Math.abs(dy);
      }
      if (horiz) render(dx);   // 跟手拖动
    }, { passive: true });
    viewport.addEventListener("touchend", () => {
      if (!dragging) return;
      dragging = false;
      track.style.transition = "";
      if (horiz) {
        const threshold = viewport.clientWidth * 0.16;
        if (dx <= -threshold) goTo(current + 1);
        else if (dx >= threshold) goTo(current - 1);
        else goTo(current);
      }
    });

    document.addEventListener("keydown", e => {
      // 仅当该轮播在视口中时响应方向键
      const r = viewport.getBoundingClientRect();
      if (r.top > window.innerHeight || r.bottom < 0) return;
      if (e.key === "ArrowRight") goTo(current + 1);
      if (e.key === "ArrowLeft")  goTo(current - 1);
    });

    if (n <= 1) {
      dots.style.display = "none";
      prev.style.display = "none";
      next.style.display = "none";
    }
    return wrap;
  }

  /* 滚动时高亮当前分区 */
  const links = Array.from(sectnav.children);
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.toggle("active", l.dataset.id === e.target.id));
      }
    });
  }, { rootMargin: "-45% 0px -45% 0px" });
  SECTIONS.forEach(sec => obs.observe(document.getElementById(sec.id)));

  /* 始终从顶部进入；导航平滑滚动但不在地址栏留下 #（避免刷新跳到中间） */
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  if (location.hash) history.replaceState(null, "", location.pathname + location.search);

  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      const id = a.getAttribute("href").slice(1);
      if (id === "top") {
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth" });
      }
      history.replaceState(null, "", location.pathname + location.search);
    });
  });

  window.addEventListener("load", () => window.scrollTo(0, 0));
</script>
</body>
</html>
